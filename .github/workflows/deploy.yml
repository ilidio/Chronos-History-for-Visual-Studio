name: Build and Deploy VSIX

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Trigger on version tags like v1.0.0
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet Packages
      run: nuget restore Chronos-History-VS.sln

    - name: Build VSIX
      run: msbuild Chronos-History-VS.sln /p:Configuration=Release /p:DeployExtension=false /p:ZipPackageCompressionLevel=Normal

    - name: Upload VSIX Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Chronos-History-VSIX
        path: bin/Release/*.vsix

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bin/Release/*.vsix
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
